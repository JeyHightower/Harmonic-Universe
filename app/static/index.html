<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmonic Universe</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 800px;
        padding: 2rem;
        background-color: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      p {
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin-top: 2rem;
      }
      .button {
        display: inline-block;
        color: white;
        text-decoration: none;
        padding: 0.8rem 1.8rem;
        border-radius: 30px;
        font-weight: bold;
        transition: all 0.3s ease;
        margin: 0.5rem;
        cursor: pointer;
        border: none;
      }
      .button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      .button-primary {
        background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
      }
      .button-secondary {
        background: linear-gradient(to right, #f093fb 0%, #f5576c 100%);
      }
      .button-tertiary {
        background: linear-gradient(to right, #43e97b 0%, #38f9d7 100%);
      }
      .button-health {
        background: rgba(255, 255, 255, 0.2);
      }
      .loading {
        display: none;
        margin-top: 1rem;
      }
      .loading.active {
        display: block;
      }
      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hidden {
        display: none;
      }

      /* Modal Styles */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        visibility: hidden;
        opacity: 0;
        transition: visibility 0s linear 0.25s, opacity 0.25s;
      }
      .modal-overlay.active {
        visibility: visible;
        opacity: 1;
        transition-delay: 0s;
      }
      .modal {
        background: linear-gradient(135deg, #2a2a72 0%, #009ffd 100%);
        width: 90%;
        max-width: 500px;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        text-align: left;
        position: relative;
        transform: scale(0.8);
        transition: transform 0.3s;
      }
      .modal-overlay.active .modal {
        transform: scale(1);
      }
      .modal-close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 1.5rem;
        cursor: pointer;
        border: none;
        background: transparent;
        color: white;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
      }
      .form-input {
        width: 100%;
        padding: 0.8rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 1rem;
        transition: all 0.3s;
      }
      .form-input:focus {
        outline: none;
        background-color: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
      }
      .form-submit {
        width: 100%;
        margin-top: 1rem;
      }
      .error-message {
        color: #ff6b6b;
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Harmonic Universe</h1>
      <p>Explore the fascinating connection between music and physics.</p>

      <!-- Authentication Buttons Section - shown when user is not logged in -->
      <div id="auth-section" class="button-container">
        <button id="login-button" class="button button-primary login-button">
          Login
        </button>
        <button
          id="register-button"
          class="button button-secondary register-button"
        >
          Sign Up
        </button>
        <button id="demo-button" class="button button-tertiary">
          Try Demo
        </button>
      </div>

      <!-- User Section - shown when user is logged in -->
      <div id="user-section" class="button-container hidden">
        <button id="dashboardButton" class="button button-primary">
          Dashboard
        </button>
        <button id="logoutButton" class="button button-secondary">
          Logout
        </button>
      </div>

      <div style="margin-top: 2rem">
        <a href="/api/health" class="button button-health">API Health Check</a>
      </div>
      <div id="loading" class="loading">
        <p>Processing request...</p>
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal-overlay">
      <div class="modal">
        <button class="modal-close">&times;</button>
        <h2>Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail" class="form-label">Email</label>
            <input
              type="email"
              id="loginEmail"
              class="form-input"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label for="loginPassword" class="form-label">Password</label>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="Enter your password"
              required
            />
          </div>
          <button type="submit" class="button button-primary form-submit">
            Login
          </button>
          <div id="loginError" class="error-message hidden"></div>
        </form>
      </div>
    </div>

    <!-- Sign Up Modal -->
    <div id="signupModal" class="modal-overlay">
      <div class="modal">
        <button class="modal-close">&times;</button>
        <h2>Sign Up</h2>
        <form id="signupForm">
          <div class="form-group">
            <label for="signupUsername" class="form-label">Username</label>
            <input
              type="text"
              id="signupUsername"
              class="form-input"
              placeholder="Choose a username"
              required
            />
          </div>
          <div class="form-group">
            <label for="signupEmail" class="form-label">Email</label>
            <input
              type="email"
              id="signupEmail"
              class="form-input"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label for="signupPassword" class="form-label">Password</label>
            <input
              type="password"
              id="signupPassword"
              class="form-input"
              placeholder="Create a password"
              required
            />
          </div>
          <button type="submit" class="button button-secondary form-submit">
            Sign Up
          </button>
          <div id="signupError" class="error-message hidden"></div>
        </form>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Get DOM elements
        const loginButton = document.getElementById('login-button');
        const registerButton = document.getElementById('register-button');
        const demoButton = document.getElementById('demo-button');
        const loadingElement = document.getElementById('loading');
        const authSection = document.getElementById('auth-section');
        const userSection = document.getElementById('user-section');
        const dashboardButton = document.getElementById('dashboardButton');
        const logoutButton = document.getElementById('logoutButton');

        // Modal elements
        const loginModal = document.getElementById('loginModal');
        const signupModal = document.getElementById('signupModal');
        const closeButtons = document.querySelectorAll('.modal-close');

        // Form elements
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginEmailInput = document.getElementById('loginEmail');
        const loginPasswordInput = document.getElementById('loginPassword');
        const signupUsernameInput = document.getElementById('signupUsername');
        const signupEmailInput = document.getElementById('signupEmail');
        const signupPasswordInput = document.getElementById('signupPassword');
        const loginError = document.getElementById('loginError');
        const signupError = document.getElementById('signupError');

        // Check if user is logged in
        const accessToken = localStorage.getItem('accessToken');
        if (accessToken) {
          console.log('User is logged in');
          // Show user section and hide auth section
          authSection.classList.add('hidden');
          userSection.classList.remove('hidden');
        } else {
          console.log('User is not logged in');
          // Show auth section and hide user section
          authSection.classList.remove('hidden');
          userSection.classList.add('hidden');
        }

        // Modal open handlers
        loginButton.addEventListener('click', function () {
          loginModal.classList.add('active');
        });

        registerButton.addEventListener('click', function () {
          signupModal.classList.add('active');
        });

        // Modal close handlers
        closeButtons.forEach(button => {
          button.addEventListener('click', function () {
            loginModal.classList.remove('active');
            signupModal.classList.remove('active');
          });
        });

        // Close modal when clicking outside
        window.addEventListener('click', function (event) {
          if (event.target === loginModal) {
            loginModal.classList.remove('active');
          }
          if (event.target === signupModal) {
            signupModal.classList.remove('active');
          }
        });

        // Dashboard button click event
        if (dashboardButton) {
          dashboardButton.addEventListener('click', function () {
            window.location.href = '/dashboard';
          });
        }

        // Demo Login
        demoButton.addEventListener('click', async function (e) {
          e.preventDefault();

          // Show loading indicator
          loadingElement.textContent = 'Logging in as demo user...';
          loadingElement.classList.add('active');
          demoButton.disabled = true;

          try {
            // Try API endpoints in sequence until one works
            let response = null;
            let error = null;

            // Try endpoints in order
            const endpoints = [
              '/api/auth/demo-login', // Core API endpoint
              '/api/v1/auth/demo-login', // Versioned API endpoint
              'http://localhost:8000/api/auth/demo-login', // Direct backend endpoint
              'http://localhost:5001/api/auth/demo-login', // Demo server endpoint
            ];

            // Try each endpoint until one works
            for (const endpoint of endpoints) {
              try {
                console.log(`Trying demo login with endpoint: ${endpoint}`);
                response = await fetch(endpoint, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  credentials: 'include',
                  mode: 'cors',
                });

                if (response.ok) {
                  console.log(
                    `Demo login successful with endpoint: ${endpoint}`
                  );
                  break; // Exit the loop if successful
                } else {
                  console.error(
                    `Demo login failed with endpoint ${endpoint}:`,
                    response.statusText
                  );
                  error = new Error(
                    `Demo login failed: ${response.statusText}`
                  );
                }
              } catch (err) {
                console.error(`Error with endpoint ${endpoint}:`, err);
                error = err;
              }
            }

            // If no endpoint worked, throw the last error
            if (!response || !response.ok) {
              throw error || new Error('All demo login endpoints failed');
            }

            const data = await response.json();
            console.log('Demo login response:', data);

            // Store tokens in localStorage
            if (data.token) {
              localStorage.setItem('accessToken', data.token);
            }
            if (data.access_token) {
              localStorage.setItem('accessToken', data.access_token);
            }
            if (data.refresh_token) {
              localStorage.setItem('refreshToken', data.refresh_token);
            }

            // Update UI before redirect
            authSection.classList.add('hidden');
            userSection.classList.remove('hidden');

            // Redirect to dashboard
            window.location.href = '/dashboard';
          } catch (error) {
            console.error('Error during demo login:', error);
            alert('An error occurred during demo login. Please try again.');
            loadingElement.classList.remove('active');
            demoButton.disabled = false;
          }
        });

        // Login form submission
        loginForm.addEventListener('submit', async function (e) {
          e.preventDefault();

          // Show loading indicator
          loadingElement.textContent = 'Logging in...';
          loadingElement.classList.add('active');
          loginError.classList.add('hidden');

          // Get form inputs
          const email = loginEmailInput.value;
          const password = loginPasswordInput.value;

          try {
            // Try API endpoints in sequence until one works
            let response = null;
            let error = null;

            // Try endpoints in order
            const endpoints = [
              '/api/auth/login', // Core API endpoint
              '/api/v1/auth/login', // Versioned API endpoint
              'http://localhost:8000/api/auth/login', // Direct backend endpoint
              'http://localhost:5001/api/auth/login', // Demo server endpoint
            ];

            // Try each endpoint until one works
            for (const endpoint of endpoints) {
              try {
                console.log(`Trying login with endpoint: ${endpoint}`);
                response = await fetch(endpoint, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({ email, password }),
                  credentials: 'include',
                  mode: 'cors',
                });

                if (response.ok) {
                  console.log(`Login successful with endpoint: ${endpoint}`);
                  break; // Exit the loop if successful
                } else {
                  console.error(
                    `Login failed with endpoint ${endpoint}:`,
                    response.statusText
                  );
                  error = new Error(`Login failed: ${response.statusText}`);
                }
              } catch (err) {
                console.error(`Error with endpoint ${endpoint}:`, err);
                error = err;
              }
            }

            // If no endpoint worked, throw the last error
            if (!response || !response.ok) {
              throw error || new Error('All login endpoints failed');
            }

            const data = await response.json();
            console.log('Login response:', data);

            // Store tokens in localStorage
            if (data.token) {
              localStorage.setItem('accessToken', data.token);
            }
            if (data.access_token) {
              localStorage.setItem('accessToken', data.access_token);
            }
            if (data.refresh_token) {
              localStorage.setItem('refreshToken', data.refresh_token);
            }

            // Close modal
            loginModal.classList.remove('active');

            // Update UI before redirect
            authSection.classList.add('hidden');
            userSection.classList.remove('hidden');

            // Redirect to dashboard
            window.location.href = '/dashboard';
          } catch (error) {
            console.error('Error during login:', error);
            loginError.textContent =
              'Login failed. Please check your credentials and try again.';
            loginError.classList.remove('hidden');
            loadingElement.classList.remove('active');
          }
        });

        // Signup form submission
        signupForm.addEventListener('submit', async function (e) {
          e.preventDefault();

          // Show loading indicator
          loadingElement.textContent = 'Creating account...';
          loadingElement.classList.add('active');
          signupError.classList.add('hidden');

          // Get form inputs
          const username = signupUsernameInput.value;
          const email = signupEmailInput.value;
          const password = signupPasswordInput.value;

          try {
            // Try API endpoints in sequence until one works
            let response = null;
            let error = null;

            // Try endpoints in order
            const endpoints = [
              '/api/auth/signup', // Core API endpoint
              '/api/v1/auth/signup', // Versioned API endpoint
              '/api/auth/register', // Alternative endpoint name
              '/api/v1/auth/register', // Alternative versioned endpoint
              'http://localhost:8000/api/auth/signup', // Direct backend endpoint
              'http://localhost:5001/api/auth/signup', // Demo server endpoint
            ];

            // Try each endpoint until one works
            for (const endpoint of endpoints) {
              try {
                console.log(`Trying signup with endpoint: ${endpoint}`);
                response = await fetch(endpoint, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({ username, email, password }),
                  credentials: 'include',
                  mode: 'cors',
                });

                if (response.ok) {
                  console.log(`Signup successful with endpoint: ${endpoint}`);
                  break; // Exit the loop if successful
                } else {
                  console.error(
                    `Signup failed with endpoint ${endpoint}:`,
                    response.statusText
                  );
                  error = new Error(`Signup failed: ${response.statusText}`);
                }
              } catch (err) {
                console.error(`Error with endpoint ${endpoint}:`, err);
                error = err;
              }
            }

            // If no endpoint worked, throw the last error
            if (!response || !response.ok) {
              throw error || new Error('All signup endpoints failed');
            }

            const data = await response.json();
            console.log('Signup response:', data);

            // Store tokens in localStorage
            if (data.token) {
              localStorage.setItem('accessToken', data.token);
            }
            if (data.access_token) {
              localStorage.setItem('accessToken', data.access_token);
            }
            if (data.refresh_token) {
              localStorage.setItem('refreshToken', data.refresh_token);
            }

            // Close modal
            signupModal.classList.remove('active');

            // Update UI before redirect
            authSection.classList.add('hidden');
            userSection.classList.remove('hidden');

            // Redirect to dashboard
            window.location.href = '/dashboard';
          } catch (error) {
            console.error('Error during signup:', error);
            signupError.textContent =
              'Signup failed. Please check your information and try again.';
            signupError.classList.remove('hidden');
            loadingElement.classList.remove('active');
          }
        });

        // Logout button handler
        if (logoutButton) {
          logoutButton.addEventListener('click', function () {
            console.log('Logout button clicked');

            // Clear tokens from localStorage
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');

            console.log('Tokens cleared from localStorage');

            // Update UI
            authSection.classList.remove('hidden');
            userSection.classList.add('hidden');

            // Redirect to homepage
            window.location.href = '/';
          });
        }
      });
    </script>
  </body>
</html>
