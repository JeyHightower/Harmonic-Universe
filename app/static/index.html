<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmonic Universe</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 800px;
        padding: 2rem;
        background-color: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      p {
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin-top: 2rem;
      }
      .button {
        display: inline-block;
        color: white;
        text-decoration: none;
        padding: 0.8rem 1.8rem;
        border-radius: 30px;
        font-weight: bold;
        transition: all 0.3s ease;
        margin: 0.5rem;
        cursor: pointer;
      }
      .button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      .button-primary {
        background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
      }
      .button-secondary {
        background: linear-gradient(to right, #f093fb 0%, #f5576c 100%);
      }
      .button-tertiary {
        background: linear-gradient(to right, #43e97b 0%, #38f9d7 100%);
      }
      .button-health {
        background: rgba(255, 255, 255, 0.2);
      }
      .loading {
        display: none;
        margin-top: 1rem;
      }
      .loading.active {
        display: block;
      }
      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Harmonic Universe</h1>
      <p>Explore the fascinating connection between music and physics.</p>
      <div class="button-container">
        <button id="login-button" class="button button-primary login-button">
          Login
        </button>
        <button
          id="register-button"
          class="button button-secondary register-button"
        >
          Sign Up
        </button>
        <button id="demo-button" class="button button-tertiary">
          Try Demo
        </button>
      </div>
      <div style="margin-top: 2rem">
        <a href="/api/health" class="button button-health">API Health Check</a>
      </div>
      <div id="loading" class="loading">
        <p>Logging in as demo user...</p>
        <div class="spinner"></div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const loginButton = document.getElementById('login-button');
        const registerButton = document.getElementById('register-button');
        const demoButton = document.getElementById('demo-button');
        const loadingElement = document.getElementById('loading');

        // Open login modal
        loginButton.addEventListener('click', function () {
          // Use modal parameter to trigger login modal
          window.location.href = '/#/?modal=login';
        });

        // Open register modal
        registerButton.addEventListener('click', function () {
          // Use modal parameter to trigger register modal
          window.location.href = '/#/?modal=register';
        });

        // Demo Login
        demoButton.addEventListener('click', async function (e) {
          e.preventDefault();

          // Show loading indicator
          loadingElement.classList.add('active');
          demoButton.disabled = true;

          try {
            // Make API request to demo login endpoint
            const response = await fetch('/api/auth/demo-login', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
            });

            if (response.ok) {
              const data = await response.json();

              // Store tokens in localStorage
              if (data.token) {
                localStorage.setItem('accessToken', data.token);
              }
              if (data.refresh_token) {
                localStorage.setItem('refreshToken', data.refresh_token);
              }

              // Redirect to dashboard
              window.location.href = '/dashboard';
            } else {
              console.error('Demo login failed:', response.statusText);
              alert('Demo login failed. Please try again.');
              loadingElement.classList.remove('active');
              demoButton.disabled = false;
            }
          } catch (error) {
            console.error('Error during demo login:', error);
            alert('An error occurred during demo login. Please try again.');
            loadingElement.classList.remove('active');
            demoButton.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
