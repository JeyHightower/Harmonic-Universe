services:
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: cd /opt/render/project/src && pip install -r requirements.txt && cd frontend && RENDER=true npm install && node scripts/render-build.js
    startCommand: cd /opt/render/project/src && chmod +x render-start.sh && ./render-start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: NODE_VERSION
        value: 18.17.0
      - key: RENDER
        value: 'true'
