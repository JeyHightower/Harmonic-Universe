# render.yaml
services:
  - type: web
    name: harmonic-universe
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        fromGroup: harmonic-universe
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: WEB_CONCURRENCY
        value: 1
      - key: WSGI_WORKERS
        value: 1
      - key: CI
        value: 'false'
      - key: FLASK_APP
        value: app.py
      - key: FLASK_DEBUG
        value: '0'
      - key: PYTHONPATH
        value: '.'
      - key: PYTHONUNBUFFERED
        value: '1'
      - key: STATIC_DIR
        value: static
      - key: VITE_API_URL
        value: 'https://harmonic-universe.onrender.com'
      - key: REACT_APP_BASE_URL
        value: 'https://harmonic-universe.onrender.com'
      - key: GENERATE_SOURCEMAP
        value: 'false'
      - key: NODE_OPTIONS
        value: '--max-old-space-size=3072'
      - key: RENDER
        value: 'true'
      - key: DISABLE_ESLINT_PLUGIN
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
