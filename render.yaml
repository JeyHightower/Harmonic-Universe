# render.yaml - Multi-service configuration
services:
  # Backend API service (Flask)
  - type: web
    name: harmonic-universe-api
    runtime: python
    buildCommand: pip install -U pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --log-level info --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: '.'
      - key: FLASK_APP
        value: app.py
      - key: FLASK_DEBUG
        value: '0'
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://harmonic-universe-frontend.onrender.com
    healthCheckPath: /api/health

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://harmonic-universe-api.onrender.com
      - key: REACT_APP_API_URL
        value: https://harmonic-universe-api.onrender.com

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
