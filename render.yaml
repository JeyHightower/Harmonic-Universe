# render.yaml - Optimized configuration for Harmonic Universe
services:
  # Backend API service
  - type: web
    name: harmonic-universe-api
    plan: free
    runtime: python
    buildCommand: ./render-build.sh
    startCommand: gunicorn backend.wsgi:app
    envVars:
      - key: STATIC_DIR
        value: /opt/render/project/src/static
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          name: harmonic-universe-api
          type: web
          property: url
      - key: REACT_APP_API_URL
        fromService:
          name: harmonic-universe-api
          type: web
          property: url
    autoDeploy: true

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
    ipAllowList: [] # Only allow internal connections
