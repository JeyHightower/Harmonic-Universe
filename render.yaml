# render.yaml - Minimal configuration for Harmonic Universe
services:
  # Backend API service
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: |
      pip install gunicorn==21.2.0 flask-migrate flask-cors &&
      pip install -r requirements.txt &&
      cd frontend && npm ci && npm run build &&
      mkdir -p ../static &&
      cp -r build/* ../static/
    startCommand: bash ./render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: NODE_VERSION
        value: 18.18.0
      - key: PORT
        value: 8000
      - key: STATIC_DIR
        value: /opt/render/project/src/static
      - key: FLASK_APP
        value: app
      - key: RENDER
        value: 'true'
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          name: harmonic-universe
          type: web
          property: url
      - key: REACT_APP_API_URL
        fromService:
          name: harmonic-universe
          type: web
          property: url
    autoDeploy: true

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
    ipAllowList: [] # Only allow internal connections
