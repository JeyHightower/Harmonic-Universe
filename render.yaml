# render.yaml - Multi-service configuration
services:
  # Static files service
  - type: web
    name: harmonic-universe-api
    runtime: static
    buildCommand: ./static_solution.sh
    staticPublishPath: ./public
    headers:
      - path: /health
        name: Content-Type
        value: application/json
      - path: /api/health
        name: Content-Type
        value: application/json
    routes:
      - type: rewrite
        source: /health
        destination: /health
      - type: rewrite
        source: /api/health
        destination: /api/health
    envVars:
      - key: STATIC_DIR
        value: ./public

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://harmonic-universe-api.onrender.com
      - key: REACT_APP_API_URL
        value: https://harmonic-universe-api.onrender.com

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
