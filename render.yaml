# render.yaml
services:
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: |
      # Install Python dependencies
      pip install -r backend/requirements.txt
      # Make sure gunicorn is installed
      pip install gunicorn
      # Build the React frontend
      cd frontend && npm install && npm run render-build
      # Run the asset preparation script
      cd frontend && node scripts/prepare-assets.js
      # Copy built frontend to Flask static directory
      cd ..
      mkdir -p static
      cp -r frontend/dist/* static/
      # Make the static directory writable by the app
      chmod -R 755 static/
      # Make sure the polyfill script is copied
      cp frontend/public/react-polyfill.js static/ 2>/dev/null || true
      cp frontend/public/react-context-provider.js static/ 2>/dev/null || true
    startCommand: PYTHONPATH=. gunicorn 'wsgi:application'
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: CI
        value: 'false'
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: SECRET_KEY
        generateValue: true
      - key: SCHEMA
        value: harmonic_universe_schema
      - key: PYTHONUNBUFFERED
        value: 'true'
      - key: PYTHONPATH
        value: '.'
      - key: REACT_APP_BASE_URL
        value: 'https://harmonic-universe.onrender.com'
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString
databases:
  - name: harmonic-universe-db
    plan: starter
