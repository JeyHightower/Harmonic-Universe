# render.yaml
services:
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: bash ./build.sh
    startCommand: PYTHONPATH=. gunicorn 'app:create_app()'
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: CI
        value: 'false'
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: SECRET_KEY
        generateValue: true
      - key: SCHEMA
        value: harmonic_universe_schema
      - key: PYTHONUNBUFFERED
        value: 'true'
      - key: PYTHONPATH
        value: '.'
      - key: REACT_APP_BASE_URL
        value: 'https://harmonic-universe.onrender.com'
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString
databases:
  - name: harmonic-universe-db
    plan: starter
