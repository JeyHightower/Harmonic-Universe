# render.yaml - Database-focused configuration
services:
  # Minimal application with database focus
  - type: web
    name: harmonic-universe-api
    runtime: python
    buildCommand: echo "No build needed for minimal application"
    startCommand: ./minimal_start.sh
    envVars:
      - key: STATIC_DIR
        value: /opt/render/project/src/static
      - key: PORT
        value: '10000'
      - key: PYTHONPATH
        value: /opt/render/project/src
    healthCheckPath: /health

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://harmonic-universe-api.onrender.com
      - key: REACT_APP_API_URL
        value: https://harmonic-universe-api.onrender.com

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
