# render.yaml
services:
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: |
      # Install Python dependencies
      pip install -r backend/requirements.txt
      # Make sure gunicorn is installed
      pip install gunicorn
      # Build the React frontend
      cd frontend && npm install && npm run build
      # Copy built frontend to Flask static directory
      cd ..
      # Create static directory and ensure it exists before trying to access it
      mkdir -p static
      mkdir -p static/assets
      echo "Created directories:"
      ls -la

      # Make sure the static directory exists before continuing
      if [ ! -d "static" ]; then
        echo "Static directory not found, creating it again"
        mkdir -p static
        mkdir -p static/assets
      fi

      # Create the fixed utils-fix.js script that prevents infinite recursion
      cat > static/utils-fix.js << 'EOL'
      // This script directly targets and fixes the utils.js error without recursive loading
      (function() {
        // Keep track of whether we've run this script already
        if (window.__UTILS_FIX_APPLIED__) {
          console.log('Utils fix already applied, skipping');
          return;
        }
        window.__UTILS_FIX_APPLIED__ = true;

        console.log('Applying Ant Design Icons version fixes');

        // 1. Set global version variables
        window.__ANT_ICONS_VERSION__ = '4.2.1';

        // 2. Find the actual problematic utils.js file (not this fix script)
        const scripts = document.getElementsByTagName('script');
        for (let i = 0; i < scripts.length; i++) {
          const src = scripts[i].src || '';
          // Make sure we exclude our own utils-fix.js script!
          if (src.includes('/assets/') && src.includes('utils') &&
              src.endsWith('.js') && !src.includes('utils-fix') &&
              !src.includes('patched=')) {

            console.log('Found actual utils.js file:', src);

            // Instead of loading another script, we'll just patch any vulnerable code
            try {
              // Create a safety wrapper for the problematic function
              window.__safeGetVersion = function(obj) {
                if (obj === undefined || obj === null) {
                  console.warn('Using fallback version for undefined object');
                  return '4.2.1';
                }
                return obj.version || '4.2.1';
              };

              // No need to load another script - we've patched what's needed
              console.log('Successfully applied utils.js patch');
            } catch (err) {
              console.error('Error applying utils.js patch:', err);
            }

            break;
          }
        }

        // 3. Add global protection for version property access
        try {
          // Create a safe version property getter for all objects
          const originalGetOwnPropertyDescriptor = Object.getOwnPropertyDescriptor;
          const versionDesc = Object.getOwnPropertyDescriptor(Object.prototype, 'version');

          if (!versionDesc) {
            Object.defineProperty(Object.prototype, 'version', {
              get: function() {
                // Only return the fallback for undefined/null
                if (this === undefined || this === null) {
                  console.warn('Prevented version error on undefined object');
                  return '4.2.1';
                }
                return undefined; // Regular property lookup for valid objects
              },
              configurable: true,
              enumerable: false
            });

            console.log('Installed version safety property');
          }

          // 4. Add a global error handler specifically for this error
          window.addEventListener('error', function(event) {
            if (event.message && event.message.includes('Cannot read properties of undefined') &&
                event.message.includes('version')) {
              console.warn('Caught version error, suppressing', event.message);
              event.preventDefault();
              event.stopPropagation();
              return true; // Prevent the error from appearing in console
            }
          }, true);

          console.log('Installed global error handler for version errors');
        } catch (e) {
          console.error('Error installing protections:', e);
        }
      })();
      EOL

      # Copy built frontend to static directory with verbose output
      echo "Copying frontend build to static directory"
      cp -rv frontend/dist/* static/ || echo "Warning: Could not copy all frontend files"

      # Create fallback ant-icons.js
      echo "Creating fallback ant-icons.js"
      mkdir -p static/assets
      echo "// Fallback Ant Icons implementation" > static/assets/ant-icons.js
      echo "console.log('Using minimal ant-icons fallback');" >> static/assets/ant-icons.js
      echo "window.__ANT_ICONS_VERSION__ = '4.2.1';" >> static/assets/ant-icons.js
      echo "const IconContext = {Provider: function(props) { return props.children; }, Consumer: function() {}};" >> static/assets/ant-icons.js
      echo "window.IconContext = IconContext;" >> static/assets/ant-icons.js

      # Create and copy the Ant Design version polyfill
      cat > static/ant-design-polyfill.js << 'EOL'
      // Polyfill for Ant Design Icons version
      (function() {
        console.log("Applying Ant Design Icons polyfill");

        // Set global version property
        window.__ANT_ICONS_VERSION__ = "4.2.1";

        // Create version object on window
        window.AntDesignIconsVersion = {
          version: "4.2.1"
        };

        // Patch utils.js version access
        const originalGetProperty = Object.getOwnPropertyDescriptor(Object.prototype, "version");

        // Create a safe version getter
        Object.defineProperty(Object.prototype, "version", {
          get: function() {
            if (this === undefined || this === null) {
              console.warn("Attempted to access version on undefined/null, returning fallback");
              return "4.2.1";
            }
            return originalGetProperty ? originalGetProperty.get.call(this) : undefined;
          },
          configurable: true
        });

        // Clean up after 5 seconds to avoid memory leaks
        setTimeout(function() {
          if (originalGetProperty) {
            Object.defineProperty(Object.prototype, "version", originalGetProperty);
          } else {
            delete Object.prototype.version;
          }
          console.log("Removed temporary version property patch");
        }, 5000);
      })();
      EOL

      # Create the critical patch files
      echo "Creating critical Ant Design Icons patch files"

      # Create ant-icons-patch.js
      cat > static/ant-icons-patch.js << 'EOL'
      (function() {
        console.log('Applying critical Ant Design Icons version patch');

        // Create a safety wrapper for accessing .version property
        Object.defineProperty(Object.prototype, 'version', {
          get: function() {
            if (this === undefined || this === null) {
              console.warn('Prevented version access error on undefined object');
              return '4.2.1';
            }
            return this._version || '4.2.1';
          },
          set: function(val) {
            this._version = val;
          },
          configurable: true
        });

        // Install a global error handler for this specific issue
        window.addEventListener('error', function(e) {
          if (e.message && e.message.includes('version')) {
            console.warn('Caught version error, suppressing');
            e.preventDefault();
          }
        }, true);

        // Create global objects with version property
        window.__ANT_ICONS__ = { version: '4.2.1' };
        window.__ANT_ICONS_VERSION__ = '4.2.1';
      })();
      EOL

      # Ensure static directory and assets exist and have correct permissions
      mkdir -p static/assets

      # Copy assets if they exist
      if [ -d "frontend/dist/assets" ]; then
        cp -rv frontend/dist/assets/* static/assets/ || echo "Warning: Could not copy all asset files"
      fi

      # Make a copy of any ant-icons file without hash for direct access
      find frontend/dist/assets -name "ant-icons-*.js" -exec cp -v {} static/assets/ant-icons.js \; || echo "No hashed ant-icons files found, using fallback"

      # List directories to debug
      echo "Current directory structure:"
      find . -type d -maxdepth 2

      # Set permissions for the files
      chmod -R 755 static || echo "Warning: Could not set permissions on static directory"
      chmod 644 static/ant-design-polyfill.js static/ant-icons-patch.js static/utils-fix.js || echo "Warning: Could not set permissions on patch files"

      # Patch JS files to fix version property access if any exist
      echo "Patching utils.js files for version access safety"
      find static/assets -name "utils*.js" -exec sed -i "s/\([a-zA-Z0-9_$]\+\)\.version/(\1 || {version:\"4.2.1\"}).version/g" {} \; || echo "No utils files found to patch"

      # Direct fix for utils.js at line 85 if it exists
      find static/assets -name "utils-*.js" -exec sed -i '85s/\([a-zA-Z0-9_$.]\+\)\.version/(\1 || {version:"4.2.1"}).version/g' {} \; || echo "No utils files found at expected location"

      # List contents to verify
      echo "Static directory contents:"
      ls -la static || echo "Static directory not found"
      echo "Assets directory contents:"
      ls -la static/assets || echo "Assets directory not found"

      # Ensure polyfill scripts are copied (with error handling)
      cp frontend/public/react-polyfill.js static/ 2>/dev/null || echo "React polyfill script not found or could not be copied"
      cp frontend/public/react-context-provider.js static/ 2>/dev/null || echo "Context provider script not found or could not be copied"

      # Final verification of static directory
      echo "Final static directory structure:"
      find static -type f | sort || echo "Could not list static directory contents"
    startCommand: PYTHONPATH=. gunicorn 'app:create_app()'
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: CI
        value: 'false'
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: SECRET_KEY
        generateValue: true
      - key: SCHEMA
        value: harmonic_universe_schema
      - key: PYTHONUNBUFFERED
        value: 'true'
      - key: PYTHONPATH
        value: '.'
      - key: REACT_APP_BASE_URL
        value: 'https://harmonic-universe.onrender.com'
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString
databases:
  - name: harmonic-universe-db
    plan: starter
