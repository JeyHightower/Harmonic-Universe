# render.yaml - Multi-service configuration
services:
  # Backend API service (Flask)
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: ./render_build.sh
    startCommand: ./render_start.sh
    envVars:
      - key: STATIC_DIR
        value: /opt/render/project/src/static
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: '10000'
      - key: PYTHON_VERSION
        value: '3.11.0'
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: GUNICORN_CMD_ARGS
        value: '--timeout 120 --workers 2 --log-level info'
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: static-files
      mountPath: /opt/render/project/src/static
      sizeGB: 1

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://harmonic-universe-api.onrender.com
      - key: REACT_APP_API_URL
        value: https://harmonic-universe-api.onrender.com

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
