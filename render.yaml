# render.yaml - Optimized configuration for Harmonic Universe
services:
  # Backend API service
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: >
      chmod +x render_build.sh prerun.sh patch_flask_app.py html_fallback.py start_flask.py gunicorn.conf.py wsgi_direct.py &&
      ./render_build.sh
    startCommand: >
      bash -c "
      python -c \"import os; os.makedirs('/opt/render/project/src/static', exist_ok=True);
      os.makedirs('/opt/render/project/src/app/static', exist_ok=True)\" &&
      FLASK_APP=app &&
      ./prerun.sh &&
      gunicorn wsgi_direct:application --bind 0.0.0.0:$PORT --log-level info --worker-class=sync --workers=1
      "
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 18.18.0
      - key: PORT
        value: 8000
      - key: STATIC_DIR
        value: /opt/render/project/src/static
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: FLASK_APP
        value: app
      - key: RENDER
        value: 'true'
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          name: harmonic-universe
          type: web
          property: url
      - key: REACT_APP_API_URL
        fromService:
          name: harmonic-universe
          type: web
          property: url
    autoDeploy: true

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
    ipAllowList: [] # Only allow internal connections
