# render.yaml
services:
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: |
      # Install Python dependencies
      pip install -r backend/requirements.txt
      # Make sure gunicorn is installed
      pip install gunicorn
      # Build the React frontend
      cd frontend && npm install && npm run build
      # Generate the Ant Design icons fallback script
      node frontend/scripts/generate-ant-icons-fallback.js
      # Copy built frontend to Flask static directory
      mkdir -p static
      # Use verbose cp to see what's happening
      cp -rv frontend/dist/* static/
      # Explicitly create assets directory if it doesn't exist
      mkdir -p static/assets
      # Make sure assets are properly copied
      if [ -d "frontend/dist/assets" ]; then
        cp -rv frontend/dist/assets/* static/assets/
      fi
      # Copy the ant-icons.js and fallback script to the root static directory
      cp -v frontend/dist/ant-icons-fallback.js static/ 2>/dev/null || echo "Fallback script not found, will be generated"
      # Set proper permissions
      chmod -R 755 static
      # List contents to verify
      ls -la static
      ls -la static/assets || echo "No assets directory"
      # Make sure the polyfill scripts are copied
      cp frontend/public/react-polyfill.js static/ 2>/dev/null || echo "Polyfill script not found"
      cp frontend/public/react-context-provider.js static/ 2>/dev/null || echo "Context provider script not found"
      # Verify the final structure
      echo "Final static directory structure:"
      find static -type f | sort
    startCommand: PYTHONPATH=. gunicorn 'wsgi:application'
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: CI
        value: 'false'
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: SECRET_KEY
        generateValue: true
      - key: SCHEMA
        value: harmonic_universe_schema
      - key: PYTHONUNBUFFERED
        value: 'true'
      - key: PYTHONPATH
        value: '.'
      - key: REACT_APP_BASE_URL
        value: 'https://harmonic-universe.onrender.com'
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString
databases:
  - name: harmonic-universe-db
    plan: starter
