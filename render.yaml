# render.yaml - Multi-service configuration
services:
  # Backend API service (Flask)
  - type: web
    name: harmonic-universe-api
    runtime: python
    buildCommand: >
      # Initial setup
      python -m pip install -U pip &&
      python -m pip install gunicorn==20.1.0 Flask==2.0.1 psycopg2-binary==2.9.9 sqlalchemy &&

      # Move the migration fix script to backend directory
      if [ -d "backend" ]; then
        cp render_migration_fix.py backend/ &&
        cd backend &&
        pip install -r requirements.txt &&

        # Run the direct fix script
        python render_migration_fix.py || echo "Migration fix completed or failed, continuing build" &&

        # Run migrations with continuation on error
        if [ -n "$FLASK_APP" ]; then
          flask db upgrade || echo "Migration errors occurred but continuing"
        else
          export FLASK_APP=app.main:app &&
          flask db upgrade || echo "Migration errors occurred but continuing"
        fi
      else
        # If no backend directory, run in current directory
        pip install -r requirements.txt &&
        python render_migration_fix.py || echo "Migration fix completed or failed, continuing build" &&

        # Run migrations with continuation on error
        if [ -n "$FLASK_APP" ]; then
          flask db upgrade || echo "Migration errors occurred but continuing"
        else
          export FLASK_APP=wsgi.py &&
          flask db upgrade || echo "Migration errors occurred but continuing"
        fi
      fi
    startCommand: chmod +x render_deploy.sh && ./render_deploy.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: '.:/opt/render/project/src'
      - key: FLASK_APP
        value: wsgi_wrapper.py
      - key: FLASK_DEBUG
        value: '0'
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://harmonic-universe-frontend.onrender.com
      - key: PGCONNECT_TIMEOUT
        value: '10'
      - key: DB_CONNECT_RETRY
        value: '3'
      - key: PYTHONUNBUFFERED
        value: 'true'
      - key: RENDER_DEPLOYMENT
        value: 'true'
      - key: PIP_NO_CACHE_DIR
        value: 'true'
      - key: PIP_PREFER_BINARY
        value: 'true'
      - key: DEBUG_STATIC_PATH
        value: 'true'
      - key: SKIP_DB_UPGRADE
        value: 'true'
    healthCheckPath: /api/health

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://harmonic-universe-api.onrender.com
      - key: REACT_APP_API_URL
        value: https://harmonic-universe-api.onrender.com

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
