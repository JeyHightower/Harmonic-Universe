# render.yaml
services:
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: |
      # Build frontend
      cd frontend && npm install && npm run build && cd ..
      # Build backend
      python -m pip install --upgrade pip
      python -m pip install -r backend/requirements.txt
      python -m pip install psycopg2
      python -m pip install gunicorn==21.2.0
      echo "Installed packages:"
      python -m pip list
      cd backend && python -m flask db upgrade
      cd backend && python -m flask seed all
    startCommand: |
      echo "Starting server..."
      cd backend
      export PYTHONPATH=$PYTHONPATH:$(pwd)
      echo "Python path: $PYTHONPATH"
      which gunicorn || echo "gunicorn not found in PATH"
      python -m pip show gunicorn
      python -c "import sys; print(sys.path)"
      exec gunicorn --log-level debug app.main:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: backend/app
      - key: SECRET_KEY
        generateValue: true
      - key: SCHEMA
        value: harmonic_universe_schema
      - key: PYTHONUNBUFFERED
        value: 'true'
      - key: PYTHONPATH
        value: '/opt/render/project/src:/opt/render/project/src/backend'
      - key: REACT_APP_BASE_URL
        fromService:
          name: harmonic-universe
          type: web
          property: origin
      - key: DATABASE_URL
        fromDatabase:
          name: harmonic-universe-db
          property: connectionString

databases:
  - name: harmonic-universe-db
    plan: starter
