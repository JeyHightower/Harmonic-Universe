# render.yaml - Multi-service configuration
services:
  # Backend API service (Flask)
  - type: web
    name: harmonic-universe
    runtime: python
    buildCommand: ./render_build.sh
    startCommand: ./render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: STATIC_DIR
        value: /opt/render/project/src/static
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: '0'
      - key: STATIC_URL_PATH
        value: ''
    healthCheckPath: /api/health

  # Frontend service (React)
  - type: web
    name: harmonic-universe-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s build -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 16.13.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://harmonic-universe-api.onrender.com
      - key: REACT_APP_API_URL
        value: https://harmonic-universe-api.onrender.com

databases:
  - name: harmonic-universe-db
    plan: starter
    postgresMajorVersion: '15'
